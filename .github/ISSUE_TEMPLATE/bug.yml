name: Bug
description: Report something broken in pi-orc.
title: "fix: "
labels:
  - "type:bug"
  - "source:manual"
body:
  - type: markdown
    attributes:
      value: |
        Use this when `pi-orc` behaves incorrectly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the smallest known reproduction steps.
      placeholder: |
        1. Run ...
        2. Observe ...
        3. Expected ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Pi version, Node version, OS, and package version if known.
      placeholder: |
        - pi --version:
        - node --version:
        - OS:
        - pi-orc version:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste relevant logs only. Remove secrets.
      render: text
    validations:
      required: false
